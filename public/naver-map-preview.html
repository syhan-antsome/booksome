<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    html, body, #map { height: 100%; margin: 0; padding: 0; width: 100%; }
    body {
      background: #e8dfcf;
      color: #14251b;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      overflow: hidden;
    }
    #map { position: absolute; inset: 0; }
    .scrim {
      background: linear-gradient(180deg, rgba(20, 37, 27, 0.04), rgba(20, 37, 27, 0.16));
      inset: 0;
      pointer-events: none;
      position: absolute;
      z-index: 2;
    }
    .badge {
      background: rgba(255, 252, 244, 0.94);
      border-radius: 19px;
      bottom: 12px;
      box-shadow: 0 10px 24px rgba(20, 37, 27, 0.14);
      color: #103d2b;
      font-size: 13px;
      font-weight: 900;
      left: 12px;
      max-width: calc(100% - 24px);
      overflow: hidden;
      padding: 10px 13px;
      position: absolute;
      text-overflow: ellipsis;
      white-space: nowrap;
      z-index: 4;
    }
    .pin {
      height: 56px;
      left: 50%;
      pointer-events: none;
      position: absolute;
      top: 50%;
      transform: translate(-50%, -88%);
      width: 40px;
      z-index: 3;
    }
    .pin::before {
      background: #103d2b;
      border: 4px solid #fff7e9;
      border-radius: 50% 50% 50% 0;
      box-shadow: 0 15px 24px rgba(16, 61, 43, 0.3);
      content: "";
      height: 30px;
      left: 3px;
      position: absolute;
      top: 3px;
      transform: rotate(-45deg);
      width: 30px;
    }
    .pin::after {
      background: rgba(16, 61, 43, 0.22);
      border-radius: 50%;
      bottom: 0;
      content: "";
      height: 10px;
      left: 10px;
      position: absolute;
      width: 20px;
    }
    .error {
      align-items: center;
      background: #f6eee1;
      display: none;
      inset: 0;
      justify-content: center;
      padding: 22px;
      position: absolute;
      text-align: center;
      z-index: 6;
    }
    .error strong {
      color: #103d2b;
      display: block;
      font-size: 17px;
      font-weight: 900;
    }
    .error span {
      color: #667167;
      display: block;
      font-size: 13px;
      font-weight: 700;
      line-height: 19px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="scrim"></div>
  <div class="pin" aria-hidden="true"></div>
  <div id="badge" class="badge">대략 위치를 여는 중입니다</div>
  <div id="error" class="error">
    <strong>지도를 열지 못했습니다</strong>
    <span id="errorText">거래 지역 텍스트로 위치를 확인해주세요.</span>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var clientId = params.get("clientId") || "";
    var area = params.get("area") || "";
    var map = null;

    document.getElementById("badge").textContent = area || "거래 지역";

    function showError(message) {
      document.getElementById("errorText").textContent = message || "거래 지역 텍스트로 위치를 확인해주세요.";
      document.getElementById("error").style.display = "flex";
    }

    function initMap() {
      if (!window.naver || !naver.maps) {
        showError("네이버 지도를 불러오지 못했습니다.");
        return;
      }

      map = new naver.maps.Map("map", {
        center: new naver.maps.LatLng(37.5666103, 126.9783882),
        zoom: 14,
        minZoom: 7,
        mapDataControl: false,
        scaleControl: false,
        zoomControl: false
      });

      if (!area || !naver.maps.Service || !naver.maps.Service.geocode) {
        showError("지도에서 찾을 거래 지역이 없습니다.");
        return;
      }

      naver.maps.Service.geocode({ query: area }, function(status, response) {
        var addresses = response && response.v2 && response.v2.addresses ? response.v2.addresses : [];

        if (status !== naver.maps.Service.Status.OK || !addresses.length) {
          showError("저장된 거래 지역을 지도에서 찾지 못했습니다.");
          return;
        }

        var first = addresses[0];
        map.setCenter(new naver.maps.LatLng(Number(first.y), Number(first.x)));
        map.setZoom(15);
      });
    }

    if (!clientId) {
      showError("네이버 지도 Client ID가 없습니다.");
    } else {
      var script = document.createElement("script");
      script.src = "https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=" + encodeURIComponent(clientId) + "&submodules=geocoder&callback=initMap";
      script.onerror = function() {
        showError("네이버 지도 인증 또는 로딩에 실패했습니다.");
      };
      document.head.appendChild(script);
    }
  </script>
</body>
</html>
