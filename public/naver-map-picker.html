<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    html, body, #map { height: 100%; margin: 0; padding: 0; width: 100%; }
    body {
      background: #f6eee1;
      color: #14251b;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      overflow: hidden;
    }
    #map { position: absolute; inset: 0; }
    .map-wrap {
      bottom: 0;
      left: 0;
      position: absolute;
      right: 0;
      top: 0;
    }
    .search {
      align-items: center;
      background: rgba(255, 252, 244, 0.94);
      border-radius: 26px;
      box-shadow: 0 14px 30px rgba(20, 37, 27, 0.14);
      display: flex;
      gap: 8px;
      left: 16px;
      padding: 10px;
      position: absolute;
      right: 16px;
      top: 18px;
      z-index: 5;
    }
    .search input {
      background: transparent;
      border: 0;
      color: #103d2b;
      flex: 1;
      font-size: 16px;
      font-weight: 800;
      min-width: 0;
      outline: none;
      padding: 10px 8px;
    }
    .search button, .sheet button {
      background: #103d2b;
      border: 0;
      border-radius: 18px;
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      min-height: 40px;
      padding: 0 16px;
    }
    .pin {
      height: 62px;
      left: 50%;
      pointer-events: none;
      position: absolute;
      top: 50%;
      transform: translate(-50%, -88%);
      width: 44px;
      z-index: 4;
    }
    .pin::before {
      background: #103d2b;
      border: 4px solid #fff7e9;
      border-radius: 50% 50% 50% 0;
      box-shadow: 0 16px 26px rgba(16, 61, 43, 0.28);
      content: "";
      height: 34px;
      left: 3px;
      position: absolute;
      top: 3px;
      transform: rotate(-45deg);
      width: 34px;
    }
    .pin::after {
      background: rgba(16, 61, 43, 0.2);
      border-radius: 50%;
      bottom: 0;
      content: "";
      height: 10px;
      left: 12px;
      position: absolute;
      width: 20px;
    }
    .sheet {
      background: rgba(255, 252, 244, 0.96);
      border-radius: 28px 28px 0 0;
      bottom: 0;
      box-shadow: 0 -18px 40px rgba(20, 37, 27, 0.16);
      left: 0;
      padding: 20px 18px 22px;
      position: absolute;
      right: 0;
      z-index: 5;
    }
    .label {
      color: #8f6a42;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
    }
    .area {
      color: #14251b;
      font-size: 22px;
      font-weight: 900;
      line-height: 28px;
      margin-top: 6px;
    }
    .hint {
      color: #667167;
      font-size: 13px;
      font-weight: 700;
      line-height: 19px;
      margin: 8px 0 16px;
    }
    .toast {
      background: #a43d20;
      border-radius: 18px;
      color: #fff;
      display: none;
      font-size: 13px;
      font-weight: 900;
      left: 18px;
      line-height: 18px;
      padding: 11px 14px;
      position: absolute;
      right: 18px;
      top: 86px;
      z-index: 9;
    }
  </style>
</head>
<body>
  <div id="map" class="map-wrap"></div>
  <div class="search">
    <input id="query" placeholder="동네, 역, 장소 검색" />
    <button id="searchButton">검색</button>
  </div>
  <div class="pin" aria-hidden="true"></div>
  <div class="sheet">
    <div class="label">선택한 거래 지역</div>
    <div id="area" class="area">지도를 움직여 지역을 고르세요</div>
    <div id="hint" class="hint">가운데 핀 기준으로 지역명만 앱에 저장합니다.</div>
    <button id="selectButton">이 지역으로 선택</button>
  </div>
  <div id="toast" class="toast"></div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var clientId = params.get("clientId") || "";
    var initialArea = params.get("initialArea") || "";
    var selectedArea = "";
    var selectedAddress = "";
    var map = null;
    var lastCenter = null;

    window.onerror = function(message, source, lineno, colno) {
      var detail = [message, lineno ? "line " + lineno : ""].filter(Boolean).join(" ");
      showError("지도 오류: " + detail);
      postMessageToApp({ type: "error", message: detail });
      return true;
    };

    window.onunhandledrejection = function(event) {
      var message = event && event.reason && event.reason.message ? event.reason.message : "알 수 없는 지도 오류";
      showError("지도 오류: " + message);
      postMessageToApp({ type: "error", message: message });
    };

    document.getElementById("query").value = initialArea;

    function showError(message) {
      var toast = document.getElementById("toast");
      toast.textContent = message;
      toast.style.display = "block";
      setTimeout(function() {
        toast.style.display = "none";
      }, 3600);
    }

    function hideError() {
      document.getElementById("toast").style.display = "none";
    }

    function setArea(area, address) {
      selectedArea = area || "";
      selectedAddress = address || "";
      document.getElementById("area").textContent = selectedArea || "지역을 확인하지 못했습니다";
      document.getElementById("hint").textContent = selectedAddress
        ? selectedAddress
        : "가운데 핀 기준으로 지역명만 앱에 저장합니다.";
    }

    function postMessageToApp(payload) {
      if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
        window.ReactNativeWebView.postMessage(JSON.stringify(payload));
      }
    }

    function formatFallbackArea() {
      if (!lastCenter) return "선택한 지역";
      return "지도 선택 위치";
    }

    function regionNameFromResult(result) {
      if (!result || !result.region) return "";
      var region = result.region;
      return [region.area1 && region.area1.name, region.area2 && region.area2.name, region.area3 && region.area3.name]
        .filter(Boolean)
        .join(" ");
    }

    function labelFromReverseGeocodeResponse(response) {
      var results = response && response.v2 && response.v2.results ? response.v2.results : [];
      var regionLabel = regionNameFromResult(results[0]);
      var address = response && response.v2 && response.v2.address ? response.v2.address : {};
      var addressText = address.roadAddress || address.jibunAddress || "";

      return {
        area: addressText || regionLabel || "선택한 지역",
        detail: addressText && regionLabel ? regionLabel : addressText
      };
    }

    function reverseGeocodeCenter(onComplete) {
      if (!map || !window.naver || !naver.maps) return;

      lastCenter = map.getCenter();

      if (!naver.maps.Service || !naver.maps.Service.reverseGeocode) {
        onComplete(formatFallbackArea(), "지역명 확인 없이 지도 중심을 선택합니다.");
        return;
      }

      naver.maps.Service.reverseGeocode({ location: lastCenter }, function(status, response) {
        if (status !== naver.maps.Service.Status.OK || !response || !response.v2) {
          onComplete(formatFallbackArea(), "지역명을 확인하지 못했습니다. 지도 중심을 선택할 수 있습니다.");
          return;
        }

        var label = labelFromReverseGeocodeResponse(response);
        onComplete(label.area, label.detail);
      });
    }

    function updateSelectedArea() {
      if (!map || !window.naver || !naver.maps) return;

      reverseGeocodeCenter(setArea);
    }

    function selectCurrentArea() {
      reverseGeocodeCenter(function(area, detail) {
        setArea(area, detail);
        postMessageToApp({
          type: "select",
          areaLabel: area || detail || formatFallbackArea()
        });
      });
    }

    function searchAddress() {
      var query = document.getElementById("query").value.trim();
      if (!query || !map || !window.naver || !naver.maps || !naver.maps.Service || !naver.maps.Service.geocode) return;

      naver.maps.Service.geocode({ address: query }, function(status, response) {
        if (status !== naver.maps.Service.Status.OK) {
          showError("검색 결과를 찾지 못했습니다.");
          return;
        }

        var addresses = response && response.v2 && response.v2.addresses ? response.v2.addresses : [];
        if (!addresses.length) {
          showError("검색 결과를 찾지 못했습니다.");
          return;
        }

        hideError();
        var first = addresses[0];
        map.setCenter(new naver.maps.LatLng(Number(first.y), Number(first.x)));
        map.setZoom(16);
        setTimeout(updateSelectedArea, 180);
      });
    }

    function initMap() {
      if (!window.naver || !naver.maps) {
        showError("네이버 지도를 불러오지 못했습니다.");
        return;
      }

      map = new naver.maps.Map("map", {
        center: new naver.maps.LatLng(37.5666103, 126.9783882),
        zoom: 15,
        minZoom: 7,
        mapDataControl: false,
        scaleControl: false
      });

      lastCenter = map.getCenter();

      naver.maps.Event.addListener(map, "idle", updateSelectedArea);
      document.getElementById("searchButton").addEventListener("click", searchAddress);
      document.getElementById("query").addEventListener("keydown", function(event) {
        if (event.key === "Enter") searchAddress();
      });
      document.getElementById("selectButton").addEventListener("click", function() {
        selectCurrentArea();
      });

      setTimeout(function() {
        if (initialArea) {
          searchAddress();
        } else {
          updateSelectedArea();
        }
      }, 350);
    }

    if (!clientId) {
      showError("네이버 지도 Client ID가 없습니다.");
    } else {
      var script = document.createElement("script");
      script.src = "https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=" + encodeURIComponent(clientId) + "&submodules=geocoder&callback=initMap";
      script.onerror = function() {
        showError("네이버 지도 인증 또는 로딩에 실패했습니다.");
        postMessageToApp({ type: "error", message: "네이버 지도 인증 또는 로딩에 실패했습니다." });
      };
      document.head.appendChild(script);
    }
  </script>
</body>
</html>
